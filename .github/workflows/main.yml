name: Morning News Monitor

on:
  schedule:
    # Runs every 10 minutes from 05:00 to 10:50 KST.
    - cron: "*/10 20-23,0-1 * * 0-5"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run regardless of sheet schedule"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
        run: python scripts/monitor.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --cached --quiet || git commit -m "Update morning news monitor outputs"
          git push
